name: Implementation task
description: A scoped technical task linked to an epic or PRD
title: "[Task] "
labels: ["chore", "p2"]
body:
  - type: input
    id: parent
    attributes:
      label: Parent issue or epic
      placeholder: "#123"
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Why does this task exist?
    validations:
      required: true
  - type: textarea
    id: implementation
    attributes:
      label: Implementation notes
      placeholder: |
        Approach:
        - ...
        Constraints:
        - ...
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      placeholder: |
        - [ ] ...
    validations:
      required: true
  - type: textarea
    id: test-plan
    attributes:
      label: Test plan
      placeholder: |
        - [ ] Unit or integration tests
        - [ ] Manual verification
    validations:
      required: true
